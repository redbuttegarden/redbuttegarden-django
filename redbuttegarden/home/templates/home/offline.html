<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background-color: #0b412d;
        color: white;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        border: 1px solid #D0E8E5;
        border-radius: 12px;
        padding: 18px;
      }
      a {
        color: inherit;
      }
      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        border: 1px solid #EFB544;
        border-radius: 10px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>This page can’t be loaded right now. Check your connection and try again.</p>
      <p>
        <a class="btn" href="/">Go Home</a>
      </p>
    </div>
  </body>
</html>
